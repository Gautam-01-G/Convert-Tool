<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excel Converter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {
 font-family: Montserrat, sans-serif;
 background: #000;
 color: #fff;
 text-align: center;
}
h1 {
 color: #A855F7;
}
.box {
 border: 1px solid #A855F7;
 padding: 20px;
 margin: 20px;
 border-radius: 10px;
}
button {
 background: #A855F7;
 color: #fff;
 border: none;
 padding: 10px 20px;
 cursor: pointer;
}
input {
 margin: 10px;
}
</style>
</head>
<body>
<h1>Excel Converter</h1>
<div class="box">
<h2>📄 PDF → Excel</h2>
<input type="file" id="pdfFile">
<button onclick="pdfToExcel()">Convert</button>
</div>
<div class="box">
<h2>🖼️ JPG → PDF (100+ Images)</h2>
<input type="file" id="images" multiple>
<button onclick="imagesToPDF()">Convert</button>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
function pdfToExcel() {
 const file = document.getElementById('pdfFile').files[0];
 if (!file) return alert("Upload PDF");
 alert("Processing...");
 const reader = new FileReader();
 reader.onload = async function() {
   const pdf = await pdfjsLib.getDocument({data: reader.result}).promise;
   let rows = [];
   for (let i = 1; i <= pdf.numPages; i++) {
     let page = await pdf.getPage(i);
     let content = await page.getTextContent();
     let row = content.items.map(item => item.str);
     rows.push(row);
   }
   let ws = XLSX.utils.aoa_to_sheet(rows);
   let wb = XLSX.utils.book_new();
   XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
   XLSX.writeFile(wb, "output.xlsx");
 };
 reader.readAsArrayBuffer(file);
}
async function imagesToPDF() {
 const { jsPDF } = window.jspdf;
 const files = document.getElementById('images').files;
 if (!files.length) return alert("Upload images");
 let pdf = new jsPDF();
 for (let i = 0; i < files.length; i++) {
   let img = await createImageBitmap(files[i]);
   let canvas = document.createElement("canvas");
   canvas.width = img.width;
   canvas.height = img.height;
   let ctx = canvas.getContext("2d");
   ctx.drawImage(img, 0, 0);
   let imgData = canvas.toDataURL("image/jpeg");
   if (i > 0) pdf.addPage();
   pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
 }
 pdf.save("images.pdf");
}
</script>
</body>
</html>
